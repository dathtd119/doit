# do product skill presentation overlay (L4 progressive policy — M1 start)
#
# Purpose:
#   - Document progressive / curated / firehose modes for skill surface
#   - Record role defaults that reduce dump vs stock agent default
#     (stock AgentDefinition.discover_skills = true)
#   - Hold recommended [skills] ignore/disabled fragments for operators
#     to merge into ~/.grok/config.toml (runtime SoT for skills config)
#
# NOT a second skill runtime. Stock discovery + agent frontmatter remain
# the implementation. Apply role flags by editing do-harness/agents/*.md
# (already applied for M1 roster — see presentation.role_discover_skills).
#
# Policy doc: docs/progressive-skills.md
# Feature: F-M1-SKILL / VAL-M1-SKILL-001 (M1-S01)
# Deepen: M2-S02 (default progressive product-wide; firehose opt-in)

presentation:
  # Product default direction (M1 start). M2 may enforce for all roles.
  default_mode: progressive
  # Stock-like full discovery — document as opt-in, not long-term default.
  firehose_mode: opt_in
  # Prefer mid-session SkillDiscoveryReminder over always-on full body dump.
  prefer_discovery_reminder: true
  # Soft authoring target for skill listing inject (chars); not a hard CI gate.
  listing_budget_chars_soft: 4000

# Role → whether AgentBuilder discovers skills from CWD / seeds tracker.
# false = reduced firehose vs stock default (true).
role_discover_skills:
  intake: false
  explorer: false
  oracle: false
  orchestrator: true
  worker: true

# Optional explicit allowlists (M2 curated mode). Empty = no extra preload.
# When discoverSkills is false, only skills named here (if any) can be preloaded
# via agent frontmatter `skills:`.
role_skill_allowlist:
  intake: []
  explorer: []
  oracle: []
  orchestrator: []
  worker: []

# Recommended stock TOML fragments (merge into ~/.grok/config.toml).
# Paths are examples — expand ~ and tune per machine. Empty ignore = no-op.
recommended_toml:
  # Hide WIP / scratch skill trees entirely (not listed, not invocable).
  skills_ignore: []
  # Keep name visible but exclude from prompt + invocation.
  skills_disabled: []
  # Extra roots increase firehose — leave empty unless team packs are required.
  skills_paths: []
  # Vendor skill trees: set false when only .grok skills are used.
  # compat.claude.skills / compat.cursor.skills — see stock user-guide.
  disable_vendor_skills_when_unused: true

# MCP stays progressive via stock tools (no reinvent).
mcp:
  discovery: search_tool
  invoke: use_tool
  policy: progressive_search_then_use
