# DEPRECATED as SoT — prefer config.agents.toml + [agents].
# Kept for migration: same contracts under legacy [roles] short stems so older
# merge scripts and docs that still say config.roles.toml keep working.
# Runtime accepts both [agents] and [roles]; new installs should use [agents].
#
# See docs/agents-and-prompts.md.

[roles]
default = "intake"
# order uses aliases for chrome; resolve maps to canonical names
order = [
  "intake",
  "orchestrator",
  "explore",
  "worker",
  "oracle",
]

[roles.intake]
alias = "intake"
name = "grok-build-ask-user"
description = "do product intake — clarify intent; no implementation"
model = "combo-big"
color = "cyan"
permission_mode = "plan"
discover_skills = false
allowed_subagents = ["explore"]
tools = [
  "read_file",
  "list_dir",
  "grep",
  "run_terminal_cmd",
  "ask_user_question",
  "Agent(explore)",
]
disallowed_tools = [
  "search_replace",
  "write",
  "image_gen",
  "image_edit",
  "image_to_video",
  "reference_to_video",
  "enter_plan_mode",
  "exit_plan_mode",
  "update_goal",
  "todo_write",
]

[roles.orchestrator]
alias = "orchestrator"
name = "grok-build-orchestrator"
description = "do product orchestrator — continuum + spawn specialists; no bulk write"
model = "combo-big"
color = "blue"
permission_mode = "default"
discover_skills = false
allowed_subagents = [
  "explore",
  "plan",
  "grok-build-worker",
  "grok-build-oracle",
  "general-purpose",
  "grok-build-ask-user",
]
tools = [
  "read_file",
  "list_dir",
  "grep",
  "run_terminal_cmd",
  "ask_user_question",
  "update_goal",
  "todo_write",
  "enter_plan_mode",
  "exit_plan_mode",
  "task",
  "Agent(explore)",
  "Agent(plan)",
  "Agent(grok-build-worker)",
  "Agent(grok-build-oracle)",
  "Agent(general-purpose)",
  "Agent(grok-build-ask-user)",
]
disallowed_tools = [
  "write",
  "search_replace",
  "image_gen",
  "image_edit",
  "image_to_video",
  "reference_to_video",
]

[roles.explore]
alias = "explorer"
name = "explore"
description = "do product explorer — read-only scout / maps / citations"
model = "combo-small"
color = "green"
permission_mode = "plan"
discover_skills = false
allowed_subagents = []
tools = [
  "read_file",
  "list_dir",
  "grep",
  "run_terminal_cmd",
  "lsp",
  "search_tool",
  "use_tool",
]
disallowed_tools = [
  "search_replace",
  "write",
  "image_gen",
  "image_edit",
  "image_to_video",
  "reference_to_video",
  "enter_plan_mode",
  "exit_plan_mode",
  "update_goal",
  "todo_write",
  "Agent(grok-build-worker)",
  "Agent(grok-build-oracle)",
  "Agent(grok-build-orchestrator)",
]

# Legacy key "explorer" → same as explore (sync may still write this)
