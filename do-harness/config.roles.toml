# Product role contracts — source of truth for tools / model / color / floors.
# Merge into ~/.config/doit/config.toml (and optionally project .doit/config.toml).
#
# Prompt mission text lives body-only under prompts/roles/<stem>.md.
# Runtime loads bodies from prompts/roles (compile-time) + optional
# .doit/prompts/roles or ~/.config/doit/prompts/roles overrides.
# Agent dirs (.doit/agents, ~/.config/doit/agents) are user override only —
# product does not install stock roles there.
# Validate:
#   bash do-harness/scripts/apply-role-contracts.sh --validate
#
# Sealed: D2 (plan 260716-2010). See docs/models-and-config.md § Role contracts.
#
# Media tools (image_gen / image_edit / image_to_video / reference_to_video)
# are denied on every product role. File toolset is standard (no hashline_*).

[roles]
default = "intake"

[roles.intake]
description = "do product intake — clarify intent; no implementation"
model = "combo-big"
color = "cyan"
permission_mode = "plan"
discover_skills = false
tools = [
  "read_file",
  "list_dir",
  "grep",
  "run_terminal_cmd",
  "ask_user_question",
  "Agent(explore)",
]
disallowed_tools = [
  "search_replace",
  "write",
  "image_gen",
  "image_edit",
  "image_to_video",
  "reference_to_video",
  "enter_plan_mode",
  "exit_plan_mode",
  "update_goal",
  "todo_write",
]

[roles.orchestrator]
description = "do product orchestrator — continuum + spawn specialists; no bulk write"
model = "combo-big"
color = "blue"
permission_mode = "default"
discover_skills = false
tools = [
  "read_file",
  "list_dir",
  "grep",
  "run_terminal_cmd",
  "ask_user_question",
  "update_goal",
  "todo_write",
  "enter_plan_mode",
  "exit_plan_mode",
  "task",
  "Agent(explore)",
  "Agent(explorer)",
  "Agent(worker)",
  "Agent(oracle)",
  "Agent(intake)",
]
disallowed_tools = [
  "write",
  "search_replace",
  "image_gen",
  "image_edit",
  "image_to_video",
  "reference_to_video",
]

[roles.explorer]
description = "do product explorer — read-only scout / maps / citations"
model = "combo-small"
color = "green"
permission_mode = "plan"
discover_skills = false
tools = [
  "read_file",
  "list_dir",
  "grep",
  "run_terminal_cmd",
  "lsp",
  "search_tool",
  "use_tool",
]
disallowed_tools = [
  "search_replace",
  "write",
  "image_gen",
  "image_edit",
  "image_to_video",
  "reference_to_video",
  "enter_plan_mode",
  "exit_plan_mode",
  "update_goal",
  "todo_write",
  "Agent(worker)",
  "Agent(oracle)",
  "Agent(orchestrator)",
]

[roles.worker]
description = "do product worker — implement + verify; prefer search_replace/write"
model = "combo-medium"
color = "yellow"
permission_mode = "default"
discover_skills = false
tools = [
  "read_file",
  "list_dir",
  "grep",
  "run_terminal_cmd",
  "search_replace",
  "write",
  "lsp",
  "todo_write",
  "update_goal",
  "Agent(explore)",
  "Agent(explorer)",
]
disallowed_tools = [
  "Agent(oracle)",
  "Agent(orchestrator)",
  "image_gen",
  "image_edit",
  "image_to_video",
  "reference_to_video",
]

[roles.oracle]
description = "do product oracle — architecture / trade-offs; no bulk edit"
model = "combo-big-ultra"
# AgentColor enum: purple (not magenta)
color = "purple"
permission_mode = "plan"
discover_skills = false
tools = [
  "read_file",
  "list_dir",
  "grep",
  "run_terminal_cmd",
  "lsp",
  "ask_user_question",
  "search_tool",
  "use_tool",
  "Agent(explore)",
  "Agent(explorer)",
]
disallowed_tools = [
  "search_replace",
  "write",
  "image_gen",
  "image_edit",
  "image_to_video",
  "reference_to_video",
  "enter_plan_mode",
  "exit_plan_mode",
  "update_goal",
  "todo_write",
  "Agent(worker)",
  "Agent(orchestrator)",
]
