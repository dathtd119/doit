# do product model overlay (policy + assignment)
#
# Purpose:
#   - Human-friendly registry + role → model assignment (OpenCode-like pins)
#   - Maps to stock grok ~/.grok/config.toml [model.*] + agent frontmatter
#   - NOT a second runtime registry — stock config.toml remains runtime SoT
#   - Apply: bash do-harness/scripts/apply-models.sh --apply
#     (writes assignment into do-harness/agents/<role>.md model: pins)
#
# Schema (see docs/models-and-config.md):
#   models.default          → [models] default
#   models.registry.<name>  → [model.<name>] block
#   assignment.<role>       → role/agent model pin (short form: registry name)
#   assignment.<role>.model + .effort → frontmatter model: + effort:
#
# Secrets: use env var names only — never commit API keys.
# Limitation: L13  |  Features: F-MODEL-001 (M0), F-M1-MODEL-APPLY (M1)
#
# Example below: ≥2 models, five product role assignments.

models:
  default: combo-big
  registry:
    combo-big:
      model: your-large-model-id
      base_url: https://api.example.com/v1
      api_backend: chat_completions
      # api_key_env: EXAMPLE_API_KEY
      # name: Combo Big
      # context_window: 200000
    combo-small:
      model: your-small-model-id
      base_url: https://api.example.com/v1
      api_backend: chat_completions
      # api_key_env: EXAMPLE_API_KEY
      # name: Combo Small
      # context_window: 128000

# Role / agent → registry name
# Product roster: intake, orchestrator, explorer, worker, oracle
assignment:
  intake: combo-small
  orchestrator: combo-big
  explorer: combo-small
  worker: combo-big
  oracle: combo-big
  # Example structured pin (future / when schema supports it):
  # orchestrator:
  #   model: combo-big
  #   effort: high
