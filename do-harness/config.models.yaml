# do product model overlay (policy + assignment)
# Prefer: [roles.*.model] in config.roles.toml + sync-user-config.sh
# Runtime registry: ~/.config/doit/config.toml [model.*]

models:
  default: combo-big
  registry:
    combo-big:
      model: combo-big
      base_url: https://api.example.com/v1
      api_backend: chat_completions
    combo-big-ultra:
      model: combo-big-ultra
      base_url: https://api.example.com/v1
      api_backend: chat_completions
    combo-medium:
      model: combo-medium
      base_url: https://api.example.com/v1
      api_backend: chat_completions
    combo-small:
      model: combo-small
      base_url: https://api.example.com/v1
      api_backend: chat_completions

assignment:
  intake: combo-big
  orchestrator: combo-big
  explorer: combo-small
  worker: combo-medium
  oracle: combo-big-ultra
