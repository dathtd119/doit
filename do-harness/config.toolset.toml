# Product recommended toolset overlay.
# Source of truth fragment for operators: merge into ~/.config/doit/config.toml
# and/or project .doit/config.toml. Stock Rust Default remains Standard.
#
# Runtime: ShellToolsetConfig.file_toolset + FileToolset::tool_configs
# (crates/codegen/xai-grok-shell/src/tools/config.rs).
#
# Policy: product default is standard read_file / search_replace / grep
# (not hashline_*). Rollback to hashline: set file_toolset = "hashline".

[toolset]
# Standard file tools: read_file, search_replace, grep.
file_toolset = "standard"

# Hashline knobs kept for optional opt-in (ignored when file_toolset != hashline).
[toolset.hashline]
scheme = "chunk"
hash_len = 3
chunk_size = 8
