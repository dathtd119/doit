# Product recommended privacy / telemetry defaults.
# Merge into ~/.config/doit/config.toml and/or project .doit/config.toml.
#
# Belt-and-suspenders with crate P-NOTEL (fail-closed SpaceXAI analytics /
# Mixpanel / internal OTLP / trace upload). Runtime TOML alone cannot re-enable
# product analytics when P-NOTEL is applied; these keys still document operator
# intent and cover stock paths that read config before crate pins.
#
# External OTEL (GROK_EXTERNAL_OTEL + OTEL_*) remains optional and separate.
# See docs/patch-matrix.md (P-NOTEL-01..06) and PRIV seal notes.

[features]
telemetry = false
# Video tools: product default off. Image tools still need GROK_IMAGE_GEN=0
# / GROK_IMAGE_EDIT=0 (env-only gates) plus role disallowed_tools.
video_gen = false

[telemetry]
trace_upload = false
mixpanel_enabled = false

# ---------------------------------------------------------------------------
# Permission default (D1b): ask. Full auto-accept via CLI --yolo (Codex-like).
# Do not set ui.permission_mode = "always-approve" as product default.
# Role contracts: see config.roles.toml → merge [roles.*] into this file or
# ~/.config/doit/config.toml. Apply agent bridge:
#   bash do-harness/scripts/apply-role-contracts.sh --apply
# ---------------------------------------------------------------------------

[ui]
# Product cold-start default: ask for tool permission (not yolo / always-approve).
yolo = false
# permission_mode = "ask"   # stock alias; omit or set ask — not always-approve

# Primary session agent: product default role (must match [roles].default).
# Discovery loads do-harness/agents via project .doit/agents or ~/.config/doit/agents.
[agent]
name = "intake"

# Drop video tools when API key is present (prepare_video_gen_config path).
[tools]
disable_zdr_incompatible_tools = true

# Optional: override API tool descriptions without recompiling crates.
# Keys match client-facing name (e.g. run_terminal_cmd) or short id.
# Existing non-empty description_override from Rust (e.g. task tool) wins.
# [tools.overrides.run_terminal_cmd]
# description = "Run a shell command. Prefer focused commands; do not edit files with shell redirects."

# [roles] tables: merge via:
#   bash do-harness/scripts/sync-user-config.sh --apply
# (config only — never copies prompts; prompts SoT = do-harness/prompts/)
