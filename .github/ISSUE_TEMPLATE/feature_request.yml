name: Feature request
description: Propose a product or harness improvement
title: "[feature] "
labels: ["type:feature"]
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [P0, P1, P2, P3]
      default: 2
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [runtime, harness, docs, ci, deps, ui, auth, other]
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user/agent pain does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Desired behavior and placement (do-harness vs crate patch)
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
