# Release: multi-target GitHub Release + npm for product package/binary `doit`.
#
# VAL-PKG-002: builds package doit + binary doit with a full 6-target matrix.
# Artifact names match cargo-binstall defaults for GitHub Releases
# (see crates/codegen/doit/Cargo.toml [package.metadata.binstall]).
#
# Product version SoT: repo-root VERSION (not upstream monorepo 0.2.x).
# Tags must be v{VERSION}. Build injects DOIT_VERSION so `doit --version`
# and archives track this fork's releases, not grok-build lockstep.
#
# Targets (6):
#   - x86_64-unknown-linux-gnu
#   - aarch64-unknown-linux-gnu
#   - x86_64-apple-darwin
#   - aarch64-apple-darwin
#   - x86_64-pc-windows-msvc
#   - aarch64-pc-windows-msvc
#
# Publish surfaces:
#   - GitHub Release assets (cargo-binstall / manual download)
#   - npm @dathtd119/doit + platform optionalDependencies (npm i -g)
# No crates.io publish (package publish = false).

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string
      skip_npm:
        description: "Skip npm publish"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  PACKAGE: doit
  BINARY: doit

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
            bin_ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive_ext: tar.gz
            bin_ext: ""
          - target: x86_64-apple-darwin
            os: macos-13
            archive_ext: tar.gz
            bin_ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
            bin_ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip
            bin_ext: ".exe"
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            archive_ext: zip
            bin_ext: ".exe"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
          cache-on-failure: true

      - name: Resolve product VERSION
        id: product_version
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f VERSION ]]; then
            echo "missing repo-root VERSION" >&2
            exit 1
          fi
          # First non-empty, non-# line = product semver.
          PRODUCT_VERSION="$(grep -vE '^[[:space:]]*(#|$)' VERSION | head -n1 | tr -d '[:space:]')"
          if [[ -z "${PRODUCT_VERSION}" ]]; then
            echo "VERSION file has no semver line" >&2
            exit 1
          fi
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          TAG_VERSION="${TAG#v}"
          if [[ "${TAG_VERSION}" != "${PRODUCT_VERSION}" ]]; then
            echo "tag ${TAG} does not match VERSION ${PRODUCT_VERSION}" >&2
            echo "Bump VERSION and tag v${PRODUCT_VERSION} for product releases." >&2
            exit 1
          fi
          echo "version=${PRODUCT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Product VERSION=${PRODUCT_VERSION} (tag ${TAG})"

      # bin/protoc is a DotSlash wrapper without Windows platforms; Command::new on
      # the shebang file fails with Win32 error 193. Install a real protoc and set
      # PROTOC so build scripts skip the broken wrapper (find_protoc prefers $PROTOC).
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Export PROTOC
        shell: bash
        run: |
          set -euo pipefail
          PROTOC_BIN="$(command -v protoc)"
          if [[ -z "${PROTOC_BIN}" ]]; then
            echo "protoc not on PATH after setup-protoc" >&2
            exit 1
          fi
          # MSVC/cargo build scripts need a Win32 path. Git Bash `command -v`
          # returns /c/... which Path::try_exists rejects → find_protoc ignores $PROTOC.
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            if command -v cygpath >/dev/null 2>&1; then
              PROTOC_BIN="$(cygpath -w "${PROTOC_BIN}")"
            elif [[ "${PROTOC_BIN}" =~ ^/([a-zA-Z])/(.*)$ ]]; then
              drive="$(echo "${BASH_REMATCH[1]}" | tr '[:lower:]' '[:upper:]')"
              rest="${BASH_REMATCH[2]//\//\\}"
              PROTOC_BIN="${drive}:\\${rest}"
            fi
          fi
          echo "PROTOC=${PROTOC_BIN}" >> "${GITHUB_ENV}"
          echo "Exported PROTOC=${PROTOC_BIN}"
          protoc --version

      # Unix only: DotSlash enables local bin/protoc when $PROTOC is unset.
      # Windows bin/protoc is a shebang script (Win32 error 193) — skip install.
      - name: Install DotSlash (optional local bin/protoc)
        if: runner.os != 'Windows'
        shell: bash
        run: cargo install dotslash --locked

      # Windows MSVC: full debuginfo + this binary size hits LNK1318 (PDB LIMIT).
      # Strip symbols on Windows release only; Linux/mac keep default release info.
      - name: Build release binary
        shell: bash
        env:
          DOIT_VERSION: ${{ steps.product_version.outputs.version }}
          GROK_VERSION: ${{ steps.product_version.outputs.version }}
        run: |
          set -euo pipefail
          # Avoid MSVC LNK1318 PDB size limit on large Windows binaries.
          # Profile env alone still left /DEBUG on the link line; force it off.
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            export CARGO_PROFILE_RELEASE_DEBUG=0
            export CARGO_PROFILE_RELEASE_STRIP=symbols
            export CARGO_PROFILE_RELEASE_SPLIT_DEBUGINFO=off
            export RUSTFLAGS="${RUSTFLAGS:+$RUSTFLAGS }-C debuginfo=0 -C link-arg=/DEBUG:NONE"
          fi
          cargo build -p "${PACKAGE}" --release --target "${{ matrix.target }}"

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.product_version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          BIN_NAME="${BINARY}${{ matrix.bin_ext }}"
          ROOT="$(pwd)"
          OUT_DIR="${ROOT}/dist"
          mkdir -p "${OUT_DIR}"

          SRC="${ROOT}/target/${TARGET}/release/${BIN_NAME}"
          if [[ ! -f "${SRC}" ]]; then
            echo "missing release binary at ${SRC}" >&2
            ls -la "${ROOT}/target/${TARGET}/release" || true
            exit 1
          fi

          STAGE="$(mktemp -d)"
          cleanup() { rm -rf "${STAGE}"; }
          trap cleanup EXIT
          cp "${SRC}" "${STAGE}/${BIN_NAME}"
          if [[ -f "${ROOT}/LICENSE" ]]; then
            cp "${ROOT}/LICENSE" "${STAGE}/"
          fi
          if [[ -f "${ROOT}/THIRD-PARTY-NOTICES" ]]; then
            cp "${ROOT}/THIRD-PARTY-NOTICES" "${STAGE}/"
          fi

          ARCHIVE_BASE="${PACKAGE}-${VERSION}-${TARGET}"
          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            ARCHIVE="${ARCHIVE_BASE}.zip"
            ARCHIVE_PATH="${OUT_DIR}/${ARCHIVE}"
            (
              cd "${STAGE}"
              if command -v zip >/dev/null 2>&1; then
                zip -q "${ARCHIVE_PATH}" ./*
              else
                # PowerShell Compress-Archive fallback on Windows runners without zip.
                powershell.exe -NoProfile -Command \
                  "Compress-Archive -Path * -DestinationPath '${ARCHIVE_PATH}'"
              fi
            )
          else
            ARCHIVE="${ARCHIVE_BASE}.tar.gz"
            tar -C "${STAGE}" -czf "${OUT_DIR}/${ARCHIVE}" .
          fi

          (
            cd "${OUT_DIR}"
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
            else
              shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
            fi
          )

          echo "Built ${OUT_DIR}/${ARCHIVE}"
          ls -la "${OUT_DIR}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: doit-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all
          pattern: doit-*
          merge-multiple: true

      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          # Flatten downloaded archives + checksums
          find dist-all -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) \
            -exec cp -v {} dist/ \;
          ls -la dist
          test "$(find dist -type f | wc -l)" -ge 6

      - name: Resolve tag + version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          PRODUCT_VERSION="$(grep -vE '^[[:space:]]*(#|$)' VERSION | head -n1 | tr -d '[:space:]')"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${PRODUCT_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          PRODUCT_VERSION="${{ steps.meta.outputs.version }}"
          {
            echo "## ${TAG}"
            echo
            echo "Automated release for **doit** (product version from repo-root \`VERSION\`${PRODUCT_VERSION:+: ${PRODUCT_VERSION}})."
            echo
            echo "### Install"
            echo
            echo "```sh"
            echo "# npm (global CLI)"
            echo "npm install -g @dathtd119/doit"
            echo
            echo "# cargo-binstall (preferred Rust path when a release exists)"
            echo "cargo binstall --git https://github.com/dathtd119/doit.git doit"
            echo
            echo "# or download the archive for your target from this release:"
            echo "#   doit-<version>-<target>.tar.gz  (Unix)"
            echo "#   doit-<version>-<target>.zip     (Windows)"
            echo
            echo "# from source (Rust + DotSlash)"
            echo "cargo install --git https://github.com/dathtd119/doit.git --package doit --locked"
            echo "```"
            echo
            echo "Repository: https://github.com/dathtd119/doit"
            echo
            echo "### Targets"
            echo
            echo "- \`x86_64-unknown-linux-gnu\`"
            echo "- \`aarch64-unknown-linux-gnu\`"
            echo "- \`x86_64-apple-darwin\`"
            echo "- \`aarch64-apple-darwin\`"
            echo "- \`x86_64-pc-windows-msvc\`"
            echo "- \`aarch64-pc-windows-msvc\`"
            echo
            echo "### Changes (this git release)"
            echo
            echo "Changelog is from **this repository's** commits since the previous tag — not upstream grok-build version history."
            echo
            if PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null); then
              git log --pretty=format:'- %s (%h)' "${PREV}..HEAD" | head -80
            else
              git log --pretty=format:'- %s (%h)' -40
            fi
            echo
            echo
            echo "### Smoke"
            echo '```'
            echo "doit --version   # expect doit ${PRODUCT_VERSION:-<VERSION>}"
            echo "npm view @dathtd119/doit version"
            echo '```'
          } > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            git tag -f "$TAG" || true
            git push origin "$TAG" || true
          fi
          # Prefer create; on re-run attach/update notes + assets.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
            gh release edit "$TAG" \
              --title "doit ${TAG}" \
              --notes-file RELEASE_NOTES.md
          else
            gh release create "$TAG" \
              --title "doit ${TAG}" \
              --notes-file RELEASE_NOTES.md \
              dist/*
          fi

      - name: Upload staged dist for npm
        uses: actions/upload-artifact@v4
        with:
          name: doit-release-dist
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  npm:
    name: Publish npm packages
    needs: release
    if: ${{ github.event.inputs.skip_npm != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          name: doit-release-dist
          path: dist

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Assemble platform packages
        env:
          DOIT_VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          node npm/doit/scripts/assemble-platform-packages.js --from-archives dist
          ls -la npm/doit-*/bin/ || true

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${NPM_TOKEN:-}" ]]; then
            echo "::warning::NPM_TOKEN secret not set — skipping npm publish."
            echo "Add repo secret NPM_TOKEN (or configure npm trusted publishing) to enable:"
            echo "  npm install -g @dathtd119/doit"
            echo "GitHub Release assets were still published for cargo-binstall."
            exit 0
          fi
          # Classic token auth for @scope publish
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "${HOME}/.npmrc"
          node npm/doit/scripts/publish.js
